name: Check AirDC++ develop build and publish image

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest AirDC++ develop build
        run: |
          curl -s -L -o airdcpp-latest.tar.gz \
            https://web-builds.airdcpp.net/develop/airdcpp_latest_develop_64-bit_portable.tar.gz

      - name: Compute hash
        id: hash
        run: |
          sha256sum airdcpp-latest.tar.gz | awk '{print $1}' > latest.hash
          if [ -f previous.hash ]; then
            if diff previous.hash latest.hash > /dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no change
        if: steps.hash.outputs.changed == 'false'
        run: echo "No new AirDC++ build detected."

      - name: Save new hash
        if: steps.hash.outputs.changed == 'true'
        run: cp latest.hash previous.hash

      - name: Log in to Docker Hub
        if: steps.hash.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.hash.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: rafsis/airdcpp-web-client-darkmode:latest
