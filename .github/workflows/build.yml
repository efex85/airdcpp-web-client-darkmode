name: Build AirDC++ images (develop + stable)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:

  develop:
    name: Develop build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get develop version and URL
        id: devinfo
        run: |
          DEV_LINE=$(curl -fsL https://web-builds.airdcpp.net/develop/ \
            | grep "_64-bit_portable.tar.gz" \
            | grep -v latest \
            | sort -t "_" -k1.14rV \
            | head -n1)

          DEV_TAG=$(echo "$DEV_LINE" | cut -d "_" -f 2)
          DEV_URL="https://web-builds.airdcpp.net/develop/$(echo "$DEV_LINE" | sed -nr 's/.*href="([^"]+)".*/\1/p')"

          echo "tag=$DEV_TAG" >> $GITHUB_OUTPUT
          echo "url=$DEV_URL" >> $GITHUB_OUTPUT

      - name: Check if develop version changed
        id: hash
        run: |
          echo "${{ steps.devinfo.outputs.tag }}" > develop.version
          if [ -f develop.prev ]; then
            if diff develop.prev develop.version > /dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no change
        if: steps.hash.outputs.changed == 'false'
        run: echo "No new develop version."

      - name: Save new version
        if: steps.hash.outputs.changed == 'true'
        run: cp develop.version develop.prev

      - name: Login to Docker Hub
        if: steps.hash.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (develop)
        if: steps.hash.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            dl_url=${{ steps.devinfo.outputs.url }}
          tags: |
            rafsis/airdcpp-webclient-darkmode:develop
            rafsis/airdcpp-webclient-darkmode:${{ steps.devinfo.outputs.tag }}
            rafsis/airdcpp-webclient-darkmode:latest


  stable:
    name: Stable build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get stable version and URL
        id: stableinfo
        run: |
          STABLE_LINE=$(curl -fsL https://web-builds.airdcpp.net/stable/ \
            | grep "_64-bit_portable.tar.gz" \
            | grep -v latest \
            | sort -t "_" -k1.14rV \
            | head -n1)

          STABLE_TAG=$(echo "$STABLE_LINE" | cut -d "_" -f 2)
          STABLE_URL="https://web-builds.airdcpp.net/stable/$(echo "$STABLE_LINE" | sed -nr 's/.*href="([^"]+)".*/\1/p')"

          echo "tag=$STABLE_TAG" >> $GITHUB_OUTPUT
          echo "url=$STABLE_URL" >> $GITHUB_OUTPUT

      - name: Check if stable version changed
        id: hash
        run: |
          echo "${{ steps.stableinfo.outputs.tag }}" > stable.version
          if [ -f stable.prev ]; then
            if diff stable.prev stable.version > /dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no change
        if: steps.hash.outputs.changed == 'false'
        run: echo "No new stable version."

      - name: Save new version
        if: steps.hash.outputs.changed == 'true'
        run: cp stable.version stable.prev

      - name: Login to Docker Hub
        if: steps.hash.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (stable)
        if: steps.hash.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            dl_url=${{ steps.stableinfo.outputs.url }}
          tags: |
            rafsis/airdcpp-webclient-darkmode:stable
            rafsis/airdcpp-webclient-darkmode:${{ steps.stableinfo.outputs.tag }}
            rafsis/airdcpp-webclient-darkmode:latest
